<!doctype html>
<html>
<head>
  <title>Calculator</title>

  <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>

  <style>
  body {
    font-family: system-ui, Arial;
    background: #061023; /* navy */
    color: #c9d6e8; /* light blue-grey */
    padding: 20px;
    text-align: center;
  }

  h1 {
    color: #c9d6e8;
  }

  input, select {
    margin: 8px;
    padding: 10px;
    border-radius: 8px;
    border: 1px solid #1c2f52;
    background: #0a2342;
    color: #c9d6e8;
  }

  input::placeholder {
    color: #8fa3c7;
  }

  #result {
    margin-top: 20px;
    padding: 15px;
    border: 1px solid #1c2f52;
    border-radius: 10px;
    background: #0a2342;
    display: inline-block;
  }
</style>
</head>

<body>

<h1>Calculator</h1>

<input id="num1" type="number" placeholder="Number 1">
<input id="num2" type="number" placeholder="Number 2">

<br>

<select id="op">
  <option value="+">+</option>
  <option value="-">-</option>
  <option value="*">*</option>
  <option value="/">/</option>
</select>

<br>

<input id="color" placeholder="Type a color (red, blue)">

<h2 id="result">Result: </h2>

<script>
function calculate() {
  let a = Number($("#num1").val());
  let b = Number($("#num2").val());
  let op = $("#op").val();
  let color = $("#color").val();

  let answer;

  if(op == "+") answer = a + b;
  if(op == "-") answer = a - b;
  if(op == "*") answer = a * b;
  if(op == "/") answer = a / b;

  $("#result").text("Result: " + answer);
  $("#result").css("color", color);
}

$("#num1, #num2, #op, #color").on("input change", calculate);
</script>

</body>
