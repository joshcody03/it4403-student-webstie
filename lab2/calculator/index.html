<!doctype html>
<html>
<head>
  <title>Calculator</title>

  <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>

  <style>
    body { font-family: Arial; padding: 20px; }
    input, select { margin: 5px; padding: 5px; }
  </style>
</head>

<body>

<h1>Calculator</h1>

<input id="num1" type="number" placeholder="Number 1">
<input id="num2" type="number" placeholder="Number 2">

<br>

<select id="op">
  <option value="+">+</option>
  <option value="-">-</option>
  <option value="*">*</option>
  <option value="/">/</option>
</select>

<br>

<input id="color" placeholder="Type a color (red, blue)">

<h2 id="result">Result: </h2>

<script>
function calculate() {
  let a = Number($("#num1").val());
  let b = Number($("#num2").val());
  let op = $("#op").val();
  let color = $("#color").val();

  let answer;

  if(op == "+") answer = a + b;
  if(op == "-") answer = a - b;
  if(op == "*") answer = a * b;
  if(op == "/") answer = a / b;

  $("#result").text("Result: " + answer);
  $("#result").css("color", color);
}

$("#num1, #num2, #op, #color").on("input change", calculate);
</script>

</body>
