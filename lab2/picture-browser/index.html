<!doctype html>
<html>
<head>
  <title>Picture Browser</title>

  <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>

<style>
  body {
    font-family: system-ui, Arial;
    background: #061023; /* navy */
    color: #c9d6e8; /* light blue-grey */
    text-align: center;
    padding: 20px;
  }

  h1 {
    color: #c9d6e8;
  }

  img {
    width: 400px;
    border-radius: 12px;
    border: 2px solid #1c2f52;
    margin-top: 20px;
  }

  button {
    margin-top: 15px;
    padding: 10px 16px;
    border-radius: 10px;
    border: 1px solid #1c2f52;
    background: #0a2342;
    color: #c9d6e8;
    cursor: pointer;
  }

  button:hover {
    background: #102f5c;
  }

  #counter {
    margin-top: 10px;
    color: #8fa3c7;
  }
</style>
</head>

<body>

<h1>Picture Browser</h1>

<img id="image" src="images/pic1.jpg">

<br><br>

<button id="next">Next</button>

<p id="counter"></p>

<script>
let images = [
  "images/pic1.jpg",
  "images/pic2.jpg",
  "images/pic3.jpg",
  "images/pic4.jpg",
  "images/pic5.jpg"
];

let index = 0;

function showImage() {
  $("#image").attr("src", images[index]);
  $("#counter").text("Image " + (index+1) + " of " + images.length);
}

$("#next").click(function() {
  index++;
  if(index >= images.length) index = 0;
  showImage();
});

showImage();
</script>

</body>
</html>
